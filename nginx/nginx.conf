# ============================================================================
# Auralis — nginx reverse proxy
# Fronts the Next.js app and the FastAPI backend on a single origin (:80).
#   /            -> frontend (Next.js)
#   /api/        -> backend (FastAPI)  [strips the /api prefix]
#   /static/     -> backend static (locally-stored generated assets)
#   /docs, /openapi.json, /ws -> backend passthrough
# ============================================================================

upstream auralis_frontend {
    server frontend:3000;
}

upstream auralis_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    # Generous limits — image/video generation payloads and uploads.
    client_max_body_size 100M;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # ---- API ----  (backend mounts routes under /api/v1 — no prefix strip)
    location /api/ {
        proxy_pass http://auralis_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ---- Backend static assets (generated images/videos, local storage) ----
    location /static/ {
        proxy_pass http://auralis_backend;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ---- Backend docs & health passthrough ----
    location ~ ^/(docs|redoc|openapi.json|health)$ {
        proxy_pass http://auralis_backend;
        proxy_set_header Host $host;
    }

    # ---- Next.js frontend (everything else) ----
    location / {
        proxy_pass http://auralis_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
